[pytest]
# PyTest configuration for Insurance DW Pipeline integration tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    integration: marks tests as integration tests (requires database)
    unit: marks tests as unit tests (no database required)
    etl: marks tests for ETL DAGs
    quality: marks tests for data quality checks
    mart: marks tests for data mart DAG
    dim: marks tests for dimension table DAGs
